<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Positive Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<header class="text-center pt-16 pb-10">
    <h1 class="text-5xl md:text-6xl font-extralight tracking-widest text-slate-600">
        Positive Logs
    </h1>
    <p class="mt-4 text-slate-400 text-sm tracking-[0.3em] font-light">
        Finding light in the mist
    </p>
</header>
    <div class="w-full max-w-2xl mx-auto mt-10 p-1 rounded-3xl bg-gradient-to-r from-pink-50 via-white to-blue-50 shadow-sm">
    <div class="bg-white/60 backdrop-blur-sm rounded-[22px] p-6">
        <form action="/add" method="post" class="flex flex-col space-y-4">
            <h2 class="text-slate-500 text-sm font-medium tracking-wider uppercase">Today's Positive</h2>
            
            <div class="relative">
                <input type="text" name="context" 
                    placeholder="今日、心が動いたことは？" 
                    required
                    class="w-full bg-transparent border-b border-slate-200 focus:border-pink-300 outline-none py-2 text-slate-700 placeholder-slate-300 transition-colors duration-300"
                >
            </div>
            
            <div class="flex justify-end">
                <button type="submit" 
                    class="px-6 py-2 bg-white/80 border border-slate-100 text-slate-500 rounded-full text-sm hover:shadow-md hover:text-pink-400 transition-all duration-300">
                    投稿する
                </button>
            </div>
        </form>
    </div>
</div>
<div class="max-w-2xl mx-auto mt-12 mb-20 space-y-6">
    {% for log in logs %}
    <div class="group bg-white/50 backdrop-blur-sm border border-slate-100 p-6 rounded-[2rem] shadow-sm hover:shadow-md transition-all duration-500">
        <div class="flex justify-between items-start">
            <p class="text-slate-700 leading-relaxed font-light text-lg">
                {{ log.context }}
            </p>
            
            <form action="{{ url_for('delete', log_id=log['id']) }}" method="post" class="opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                <button type="submit" class="text-slate-300 hover:text-pink-400 text-[10px] tracking-widest uppercase">
                    Delete
                </button>
            </form>
        </div>

        <div class="mt-4 flex items-center space-x-2">
            <span class="w-1 h-1 bg-blue-200 rounded-full"></span>
            <time class="text-[10px] text-slate-400 tracking-[0.2em] font-extralight uppercase">
                {{ log.created_at }}
            </time>
        </div>
    </div>
    {% endfor %}
</div>
</body>
</html>
